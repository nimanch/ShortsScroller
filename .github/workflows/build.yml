name: Build & Screenshot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications/ | grep Xcode
          sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -project ShortsScroller.xcodeproj \
            -scheme ShortsScroller \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -30

      - name: Run on Simulator & Capture Screenshots
        run: |
          set -x
          
          # Verify the app was built
          APP_PATH="./build/Build/Products/Debug-iphonesimulator/ShortsScroller.app"
          ls -la "$APP_PATH" || { echo "App not found!"; find ./build -name "*.app" -type d; exit 1; }
          
          # Get an available iPhone simulator
          DEVICE_ID=$(xcrun simctl list devices available | grep "iPhone 16 (" | head -1 | grep -oE '[A-F0-9-]{36}')
          echo "Using device: $DEVICE_ID"
          
          # Boot it
          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          
          # Wait for boot
          echo "Waiting for simulator to boot..."
          sleep 10
          
          # Set appearance to dark mode (matches app theme)
          xcrun simctl ui "$DEVICE_ID" appearance dark
          
          # Install the app
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"
          
          # Launch it
          xcrun simctl launch "$DEVICE_ID" com.nishant.ShortsScroller
          
          # Wait for app to render
          echo "Waiting for app to load..."
          sleep 8
          
          # Screenshot 1: App launched
          mkdir -p screenshots
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/01-app-launched.png
          echo "Screenshot 1 captured"
          
          # Wait for YouTube web content to load
          sleep 12
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/02-content-loaded.png
          echo "Screenshot 2 captured"
          
          # Wait a bit more for full render
          sleep 8
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/03-ready-to-scroll.png
          echo "Screenshot 3 captured"
          
          echo "All screenshots captured!"

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: simulator-screenshots
          path: screenshots/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## 📱 ShortsScroller - Build & Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Built and ran on iPhone 16 Simulator" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Screenshots are available in the **Artifacts** section below." >> $GITHUB_STEP_SUMMARY
          if [ -d screenshots ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Captured $(ls screenshots/*.png 2>/dev/null | wc -l) screenshots" >> $GITHUB_STEP_SUMMARY
          fi
